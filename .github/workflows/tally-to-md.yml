name: Tally to Markdown 🌿
on:
  repository_dispatch:
    types: [tally_submission]

jobs:
  create_resource:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Markdown File
        run: |
          # On extrait les données du payload Tally envoyé via le Webhook
          # On suppose que tes champs Tally s'appellent : title, description, link, category, language
          node scripts/add-ressource.mjs '${{ toJson(github.event.client_payload.data) }}'

      - name: Commit and Push
        run: |
          git config --global user.name "Salvia Bot 🌱"
          git config --global user.email "bot@salvia.org"
          git add src/content/ressources/
          git commit -m "feat(content): nouvelle ressource proposée via Tally [skip ci]"
          git push origin main
