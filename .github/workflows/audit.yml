name: Weekly EcoIndex & Lighthouse Audit

on:
  schedule:
    - cron: '0 4 * * 0' # Tous les dimanches à 4h00 UTC
  workflow_dispatch: # Permet le lancement manuel

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Lighthouse Audit
        run: npx @lhci/cli autorun
        continue-on-error: true
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN }}

      - name: Run EcoIndex Audit
        run: npx @cnumr/eco-index-audit --url https://numindex.org/fr --output json > ecoindex-results.json || echo "[]" > ecoindex-results.json
        continue-on-error: true
        
      - name: Generate SVG Badges
        run: node scripts/generate-badges.mjs

      - name: Commit and push badges
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/badge-*.svg
          git commit -m "chore: update ecoindex and lighthouse badges [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
