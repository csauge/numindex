name: Daily Backup to Cloudflare R2

on:
  schedule:
    - cron: '0 3 * * *' # Tous les jours à 03h00 UTC
  workflow_dispatch: # Permet de lancer la sauvegarde manuellement depuis l'onglet Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PostgreSQL Client & Rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          # Ajout du dépôt officiel PostgreSQL pour avoir la version 17
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --batch --yes --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 rclone

      - name: Backup Database (Data Only)
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Starting pg_dump version 17..."
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --quote-all-identifiers \
            --exclude-schema=extensions \
            --schema=public \
            --schema=auth \
            --schema=storage \
            --data-only > db_backup.sql
          
          # Compression du dump
          gzip db_backup.sql

      - name: Upload DB Backup to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Other
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RCLONE_CONFIG_R2_REGION: us-east-1
          RCLONE_CONFIG_R2_FORCE_PATH_STYLE: true
        run: |
          # Nom du fichier avec la date du jour
          FILENAME="db_backup_$(date +'%Y-%m-%d').sql.gz"
          mv db_backup.sql.gz "$FILENAME"
          
          echo "Uploading $FILENAME to R2..."
          rclone copy "$FILENAME" r2:numindex-backups/database/

      - name: Sync Storage (S3) to R2
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Other
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          RCLONE_CONFIG_R2_REGION: us-east-1
          RCLONE_CONFIG_R2_FORCE_PATH_STYLE: true
          
          RCLONE_CONFIG_SUPABASE_TYPE: s3
          RCLONE_CONFIG_SUPABASE_PROVIDER: Other
          RCLONE_CONFIG_SUPABASE_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY }}
          RCLONE_CONFIG_SUPABASE_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_KEY }}
          RCLONE_CONFIG_SUPABASE_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
          RCLONE_CONFIG_SUPABASE_REGION: eu-west-3
        run: |
          echo "Syncing Supabase Storage to R2..."
          rclone sync supabase: r2:numindex-backups/storage/ --transfers=4 --progress
