<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #1c1917; background-color: #fafaf9; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 40px auto; padding: 40px; background-color: #ffffff; border: 1px solid #e7e5e4; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo img { width: 48px; height: 48px; }
    h1 { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 24px; color: #1c1917; }
    p { margin-bottom: 24px; font-size: 16px; text-align: center; }
    .button-container { text-align: center; margin: 40px 0; }
    .button { display: inline-block; padding: 16px 32px; background-color: #0000FF; color: #ffffff !important; text-decoration: none; font-weight: 900; border-radius: 16px; font-size: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .footer { text-align: center; font-size: 12px; color: #78716c; margin-top: 40px; border-top: 1px solid #f5f5f4; padding-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="https://numindex.org/favicon.svg" alt="numindex.org">
    </div>
    <h1>Vous êtes invité(e) !</h1>
    <p>Un administrateur vous a invité(e) à rejoindre numindex.org.</p>
    <div class="button-container">
      <a href="{{ .ConfirmationURL }}" class="button">Accepter l'invitation</a>
    </div>
    <p>Ce lien est valide pour une durée limitée.</p>
    <div class="footer">
      © 2026 numindex.org — L'annuaire sobre pour le numérique.
    </div>
  </div>
</body>
</html>
